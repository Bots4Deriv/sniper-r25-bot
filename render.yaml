services:
  - type: web
    name: r25-signal-bot
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot.py"
    envVars:
      - key: DERIV_APP_ID
        value: 1089

      - key: DERIV_API_TOKEN
        sync: false

      - key: TELEGRAM_BOT_TOKEN
        sync: false

      - key: TELEGRAM_CHAT_ID
        sync: false
